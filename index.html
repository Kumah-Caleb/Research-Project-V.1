<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #4CAF50; color: white; padding: 12px; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .excellent { background: #d4edda; color: #155724; }
        .good { background: #d1ecf1; color: #0c5460; }
        .average { background: #fff3cd; color: #856404; }
        .poor { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🎓 Student Performance Predictor</h1>
    
    <label>Attendance (%):</label>
    <input type="number" id="attendance" value="85">
    
    <label>Assignments (%):</label>
    <input type="number" id="assignments" value="80">
    
    <label>Engagement (%):</label>
    <input type="number" id="engagement" value="85">
    
    <label>Study Hours/Week:</label>
    <input type="number" id="studyHours" value="12">
    
    <label>Previous Grade (%):</label>
    <input type="number" id="previousGrade" value="75">
    
    <label>Extra Curricular (0-5):</label>
    <input type="number" id="extraCurricular" value="2">
    
    <label>Parent Education:</label>
    <select id="parentEducation">
        <option value="1">High School</option>
        <option value="2" selected>Bachelor's</option>
        <option value="3">Master's</option>
        <option value="4">PhD</option>
    </select>
    
    <button onclick="predict()">🔮 Predict Performance</button>
    
    <div id="result"></div>

    <script>
        // Replace with your Render URL after deployment
        const API_URL = "https://student-performance-predictor7.onrender.com";
        
        async function predict() {
            const data = {
                attendance: parseFloat(document.getElementById('attendance').value),
                assignments: parseFloat(document.getElementById('assignments').value),
                engagement: parseFloat(document.getElementById('engagement').value),
                study_hours: parseFloat(document.getElementById('studyHours').value),
                previous_grade: parseFloat(document.getElementById('previousGrade').value),
                extra_curricular: parseFloat(document.getElementById('extraCurricular').value),
                parent_education: parseFloat(document.getElementById('parentEducation').value)
            };
            
            document.getElementById('result').innerHTML = '<div>Loading...</div>';
            
            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                let gradeClass = result.prediction.toLowerCase();
                document.getElementById('result').innerHTML = `
                    <div class="result ${gradeClass}">
                        <h2>🎯 ${result.prediction}</h2>
                        <p>Score: ${result.weighted_score.toFixed(1)}%</p>
                        <p>Confidence: ${result.confidence.toFixed(1)}%</p>
                    </div>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="result poor">Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
