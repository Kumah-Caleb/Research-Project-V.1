<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED | My Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .course-card {
            transition: transform 0.2s;
            margin-bottom: 15px;
        }
        .course-card:hover {
            transform: translateY(-3px);
        }
        .enrolled-badge {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <header style="background-color: #003366; color: white; padding: 15px 0;">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-0">USTED</h1>
                    <p class="mb-0 small">Student Dashboard - Course Enrollment</p>
                </div>
                <nav>
                    <a href="student_dashboard.html" style="color: white; margin-right: 15px; text-decoration: none;">Dashboard</a>
                    <a href="my-courses.html" style="color: white; margin-right: 15px; text-decoration: none;">My Courses</a>
                    <a href="predictor-three-format.html" style="color: white; margin-right: 15px; text-decoration: none;">Predict</a>
                    <a href="history.html" style="color: white; margin-right: 15px; text-decoration: none;">History</a>
                    <a href="#" id="logoutBtn" style="color: white; text-decoration: none;">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="row">
            <div class="col-12">
                <div class="card mb-4">
                    <div class="card-header" style="background-color: #003366; color: white;">
                        <h4 class="mb-0">📚 My Enrolled Courses</h4>
                    </div>
                    <div class="card-body">
                        <div id="myCoursesList" class="row">
                            <div class="text-center">Loading your courses...</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header" style="background-color: #003366; color: white;">
                        <h4 class="mb-0">📖 Available Courses for Enrollment</h4>
                    </div>
                    <div class="card-body">
                        <div id="availableCoursesList" class="row">
                            <div class="text-center">Loading available courses...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer style="background-color: #f8f9fa; text-align: center; padding: 20px; margin-top: 40px;">
        <div class="container">
            <p class="mb-0">&copy; 2025 USTED. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const API_BASE_URL = 'https://aamusted-predictor-backend2.onrender.com';
        
        async function loadMyCourses() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('myCoursesList');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/student/courses/my-courses?token=${token}`);
                const courses = await response.json();
                
                if (courses && courses.length > 0) {
                    container.innerHTML = `
                        <div class="row">
                            ${courses.map(c => `
                                <div class="col-md-4">
                                    <div class="card course-card">
                                        <div class="card-body">
                                            <h6>${c.course_code} - ${c.course_name}</h6>
                                            <p class="small mb-1">Credits: ${c.credits} | Lecturer: ${c.lecturer_name}</p>
                                            <p class="small text-muted">Enrolled: ${new Date(c.enrolled_at).toLocaleDateString()}</p>
                                            <button class="btn btn-danger btn-sm w-100" onclick="dropCourse(${c.id})">Drop Course</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    container.innerHTML = '<div class="alert alert-info">You are not enrolled in any courses yet.</div>';
                }
            } catch (error) {
                console.error('Error loading courses:', error);
                container.innerHTML = '<div class="alert alert-danger">Error loading courses</div>';
            }
        }
        
        async function loadAvailableCourses() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('availableCoursesList');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/student/courses/available?token=${token}`);
                const courses = await response.json();
                
                if (courses && courses.length > 0) {
                    container.innerHTML = `
                        <div class="row">
                            ${courses.map(c => `
                                <div class="col-md-4">
                                    <div class="card course-card">
                                        <div class="card-body">
                                            <h6>${c.course_code} - ${c.course_name}</h6>
                                            <p class="small mb-1">Credits: ${c.credits} | Lecturer: ${c.lecturer_name}</p>
                                            <p class="small mb-2">Available: ${c.available_spots} / ${c.capacity} spots</p>
                                            <button class="btn btn-success btn-sm w-100" onclick="enrollCourse(${c.id})">Enroll Now</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    container.innerHTML = '<div class="alert alert-info">No available courses at the moment.</div>';
                }
            } catch (error) {
                console.error('Error loading available courses:', error);
                container.innerHTML = '<div class="alert alert-danger">Error loading courses</div>';
            }
        }
        
        async function enrollCourse(courseId) {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/student/courses/enroll?token=${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course_id: courseId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Successfully enrolled!');
                    loadMyCourses();
                    loadAvailableCourses();
                } else {
                    alert('Error: ' + (data.detail || 'Failed to enroll'));
                }
            } catch (error) {
                alert('Network error: ' + error.message);
            }
        }
        
        async function dropCourse(courseId) {
            if (!confirm('Are you sure you want to drop this course?')) return;
            
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/student/courses/drop/${courseId}?token=${token}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Course dropped successfully');
                    loadMyCourses();
                    loadAvailableCourses();
                } else {
                    alert('Error: ' + (data.detail || 'Failed to drop course'));
                }
            } catch (error) {
                alert('Network error: ' + error.message);
            }
        }
        
        // Check authentication
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        } else {
            loadMyCourses();
            loadAvailableCourses();
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
