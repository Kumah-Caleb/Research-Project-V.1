<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED | Prediction History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="bg-primary text-white py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-0">USTED</h1>
                    <p class="mb-0 small">Student Self-Assessment Predictor</p>
                </div>
                <nav>
                    <a href="student_dashboard.html" class="text-white me-3">Dashboard</a>
                    <a href="predictor-three-format.html" class="text-white me-3">Predict</a>
                    <a href="history.html" class="text-white me-3">History</a>
                    <a href="profile.html" class="text-white me-3">Profile</a>
                    <a href="#" id="logoutBtn" class="text-white">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">📜 Prediction History</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                             <tr>
                                <th>Course Code</th>
                                <th>Predicted Grade</th>
                                <th>Confidence</th>
                                <th>Actual Grade</th>
                                <th>Date</th>
                                <th>Status</th>
                             </tr>
                        </thead>
                        <tbody id="historyTable">
                             <tr>
                                <td colspan="6" class="text-center text-muted">Loading predictions...</td>
                             </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-3 mt-4">
        <div class="container">
            <p class="mb-0">&copy; 2025 USTED. All rights reserved.</p>
        </div>
    </footer>

        <script>`n    const API_BASE_URL = "https://aamusted-predictor-backend2.onrender.com";
        
        
        async function loadHistory() {
            const token = localStorage.getItem('token');
            const tbody = document.getElementById('historyTable');
            
            if (!token) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">Please login to view history</td></tr>';
                return;
            }
            
            tbody.innerHTML = '<tr><td colspan="6" class="text-center"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div></td></tr>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/predictions/history?token=${token}`);
                
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }
                
                const predictions = await response.json();
                console.log('Predictions loaded:', predictions);
                
                if (predictions && predictions.length > 0) {
                    tbody.innerHTML = predictions.map(p => `
                        <tr>
                            <td><strong>${p.course_code}</strong></td>
                            <td><span class="badge bg-primary">${p.predicted_grade}</span></td>
                            <td>
                                <div class="progress" style="height: 20px;">
                                    <div class="progress-bar bg-info" style="width: ${p.confidence}%">
                                        ${p.confidence}%
                                    </div>
                                </div>
                            </td>
                            <td>${p.actual_grade || '<span class="text-muted">Pending</span>'}</td>
                            <td>${new Date(p.created_at).toLocaleDateString()}</td>
                            <td>${p.actual_grade ? '✅ Completed' : '⏳ Pending'}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No predictions yet. Make your first prediction!</td></tr>';
                }
            } catch (error) {
                console.error('Error loading history:', error);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error loading history: ${error.message}</td></tr>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('token')) {
                loadHistory();
            } else {
                window.location.href = 'login.html';
            }
        });
        
        // Logout button
        document.getElementById('logoutBtn')?.addEventListener('click', function() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        });
    </script>
