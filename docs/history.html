<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History - AAMUSTED Performance Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fb; }
        
        .navbar {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #ffd700; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); }
        .logout-btn { background: rgba(255,80,60,0.3); border: 1px solid rgba(255,80,60,0.5); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        
        .stats-summary {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            text-align: center;
        }
        .stat { padding: 1rem; background: #f8f9fa; border-radius: 10px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
        
        .history-list { background: white; border-radius: 20px; overflow: hidden; }
        .history-header {
            display: grid;
            grid-template-columns: 150px 100px 1fr 100px;
            background: #f8f9fa;
            padding: 1rem;
            font-weight: bold;
            border-bottom: 2px solid #e0e0e0;
        }
        .history-item {
            display: grid;
            grid-template-columns: 150px 100px 1fr 100px;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover { background: #f8f9fa; }
        
        .grade-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            width: fit-content;
        }
        .grade-excellent { background: #d4edda; color: #28a745; }
        .grade-good { background: #d1ecf1; color: #17a2b8; }
        .grade-average { background: #fff3cd; color: #ffc107; }
        .grade-poor { background: #f8d7da; color: #dc3545; }
        
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .history-header, .history-item { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .history-header div:last-child, .history-item div:last-child { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">ðŸŽ“ AAMUSTED <span>Predictor</span></div>
        <div class="nav-links">
            <a href="student_dashboard.html">Dashboard</a>
            <a href="/predictor">Predictor</a>
            <a href="courses.html">Courses</a>
            <a href="/history" class="active">History</a>
            <a href="profile.html">Profile</a>
            <button class="logout-btn" onclick="logout()">ðŸšª Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-summary" id="statsSummary"></div>
        
        <div class="history-list">
            <div class="history-header">
                <div>Date</div>
                <div>Type</div>
                <div>Result</div>
                <div>Score</div>
            </div>
            <div id="historyItems"></div>
        </div>
    </div>
    
    <div id="detailModal" class="detail-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Prediction Details</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allPredictions = [];
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const predictions = await response.json();
                allPredictions = predictions;
                
                // Calculate stats
                const total = predictions.length;
                let totalScore = 0;
                let excellent = 0, good = 0, average = 0, poor = 0;
                
                predictions.forEach(p => {
                    totalScore += p.score || p.weighted_score || 0;
                    const grade = (p.grade || p.prediction || '').toLowerCase();
                    if (grade.includes('excellent')) excellent++;
                    else if (grade.includes('good')) good++;
                    else if (grade.includes('average')) average++;
                    else if (grade.includes('poor')) poor++;
                });
                
                const avgScore = total > 0 ? (totalScore / total).toFixed(1) : 0;
                
                document.getElementById('statsSummary').innerHTML = `
                    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total Predictions</div></div>
                    <div class="stat"><div class="stat-value">${avgScore}%</div><div class="stat-label">Average Score</div></div>
                    <div class="stat"><div class="stat-value">${excellent}</div><div class="stat-label">Excellent</div></div>
                    <div class="stat"><div class="stat-value">${good}</div><div class="stat-label">Good</div></div>
                    <div class="stat"><div class="stat-value">${average}</div><div class="stat-label">Average</div></div>
                    <div class="stat"><div class="stat-value">${poor}</div><div class="stat-label">Poor</div></div>
                `;
                
                const container = document.getElementById('historyItems');
                if (predictions.length === 0) {
                    container.innerHTML = '<div style="padding: 2rem; text-align: center; color: #999;">No predictions yet. Make your first prediction!</div>';
                    return;
                }
                
                container.innerHTML = predictions.map(p => {
                    const gradeClass = (p.grade || p.prediction || '').toLowerCase();
                    const gradeText = p.grade || p.prediction || 'N/A';
                    const score = (p.score || p.weighted_score || 0).toFixed(1);
                    const date = new Date(p.date).toLocaleDateString();
                    const type = p.type || 'general';
                    
                    return `
                        <div class="history-item" onclick="showDetails(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                            <div>${date}</div>
                            <div>${type.charAt(0).toUpperCase() + type.slice(1)}</div>
                            <div><span class="grade-badge grade-${gradeClass.includes('excellent') ? 'excellent' : gradeClass.includes('good') ? 'good' : gradeClass.includes('average') ? 'average' : 'poor'}">${gradeText}</span></div>
                            <div>${score}%</div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }
        
        function showDetails(prediction) {
            document.getElementById('modalTitle').innerHTML = `Prediction Details - ${new Date(prediction.date).toLocaleString()}`;
            
            let inputsHtml = '';
            if (prediction.inputs) {
                inputsHtml = `
                    <h4>Input Values:</h4>
                    <table style="width: 100%; margin-top: 0.5rem;">
                        ${Object.entries(prediction.inputs).map(([key, val]) => `
                            <tr><td style="padding: 0.25rem;"><strong>${key.replace(/_/g, ' ')}:</strong></td><td>${val}</td></tr>
                        `).join('')}
                    </table>
                `;
            }
            
            let metricsHtml = '';
            if (prediction.metrics) {
                metricsHtml = `
                    <h4>Performance Metrics:</h4>
                    <table style="width: 100%; margin-top: 0.5rem;">
                        ${Object.entries(prediction.metrics).map(([key, val]) => `
                            <tr><td style="padding: 0.25rem;"><strong>${key.replace(/_/g, ' ')}:</strong></td><td>${typeof val === 'number' ? val.toFixed(1) + '%' : val}</td></tr>
                        `).join('')}
                    </table>
                `;
            }
            
            document.getElementById('modalBody').innerHTML = `
                <p><strong>Prediction:</strong> ${prediction.grade || prediction.prediction}</p>
                <p><strong>Score:</strong> ${(prediction.score || prediction.weighted_score || 0).toFixed(1)}%</p>
                <p><strong>Confidence:</strong> ${prediction.confidence?.toFixed(1) || 'N/A'}%</p>
                ${inputsHtml}
                ${metricsHtml}
            `;
            
            document.getElementById('detailModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }
        
                async function logout() {
            try {
                await fetch(`${API_URL}/api/logout`, { method: 'POST' });
            } catch(e) {}
            localStorage.clear();
            window.location.href = 'login.html';
        });
            window.location.href = '/';
        }
        
        loadHistory();
    </script>
</body>
</html>
