<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="bg-primary text-white py-3">
        <div class="container">
            <div class="text-center">
                <h1 class="h3 mb-0">USTED</h1>
                <p class="mb-0 small">Student Self-Assessment Predictor</p>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Student Registration</h4>
                    </div>
                    <div class="card-body">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="register-name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="register-name" required>
                                <div id="register-name-error" class="validation-error text-danger small"></div>
                            </div>
                            <div class="mb-3">
                                <label for="register-email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="register-email" required>
                                <div id="register-email-error" class="validation-error text-danger small"></div>
                                <small class="text-muted">Format: student@usted.edu.gh</small>
                            </div>
                            <div class="mb-3">
                                <label for="register-student-id" class="form-label">Student ID</label>
                                <input type="text" class="form-control" id="register-student-id" required placeholder="ITE12345">
                                <div id="register-studentid-error" class="validation-error text-danger small"></div>
                                <small class="text-muted">Format: 3 letters followed by 5-7 digits (e.g., ITE12345)</small>
                            </div>
                            <div class="mb-3">
                                <label for="register-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="register-password" required>
                                <div id="register-password-error" class="validation-error text-danger small"></div>
                                <small class="text-muted">Minimum 8 characters, 1 uppercase, 1 lowercase, 1 number</small>
                            </div>
                            <div class="mb-3">
                                <label for="register-confirm-password" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="register-confirm-password" required>
                                <div id="register-confirm-error" class="validation-error text-danger small"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>
                        <hr>
                        <p class="text-center mb-0">Already have an account? <a href="login.html">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2025 USTED. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
