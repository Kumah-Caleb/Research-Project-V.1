<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED | Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="bg-primary text-white py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-0">USTED</h1>
                    <p class="mb-0 small">Student Self-Assessment Predictor</p>
                </div>
                <nav>
                    <a href="student_dashboard.html" class="text-white me-3">Dashboard</a>
                    <a href="predictor.html" class="text-white me-3">Predict</a>
                    <a href="history.html" class="text-white me-3">History</a>
                    <a href="profile.html" class="text-white me-3">Profile</a>
                    <a href="#" id="logoutBtn" class="text-white">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="card">
            <div class="card-body">
                <h3 id="welcomeMessage">Welcome back, Student!</h3>
                <p class="text-muted">Your academic journey at USTED</p>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Academic Summary</h5>
                        <p><strong>Current GPA:</strong> <span id="currentGpa">3.45</span></p>
                        <p><strong>Credits Completed:</strong> <span id="creditsCompleted">72</span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5>Quick Prediction</h5>
                        <a href="predictor.html" class="btn btn-light">Make Prediction</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-3 mt-4">
        <div class="container">
            <p class="mb-0">&copy; 2025 USTED. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
