<!DOCTYPE html>
<html>
<head>
    <title>USTED Register - Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4>USTED Student Registration</h4>
                    </div>
                    <div class="card-body">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label>Full Name</label>
                                <input type="text" id="name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Username</label>
                                <input type="text" id="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Student ID (10 digits)</label>
                                <input type="text" id="studentId" class="form-control" placeholder="2024001234" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>
                        <div id="result" class="mt-3"></div>
                        <hr>
                        <a href="login.html">Already have an account? Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple validation functions
        function validateStudentId(id) {
            if (!id) return { isValid: false, message: 'Student ID required' };
            if (!/^\d{10}$/.test(id)) {
                return { isValid: false, message: 'Student ID must be exactly 10 digits' };
            }
            return { isValid: true, message: '' };
        }
        
        function validateEmail(email) {
            if (!email) return { isValid: false, message: 'Email required' };
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                return { isValid: false, message: 'Invalid email format' };
            }
            return { isValid: true, message: '' };
        }
        
        function validatePassword(password) {
            if (!password) return { isValid: false, message: 'Password required' };
            if (password.length < 8) {
                return { isValid: false, message: 'Password must be at least 8 characters' };
            }
            return { isValid: true, message: '' };
        }
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const studentId = document.getElementById('studentId').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate
            if (password !== confirmPassword) {
                document.getElementById('result').innerHTML = '<div class="alert alert-danger">Passwords do not match</div>';
                return;
            }
            
            const studentIdResult = validateStudentId(studentId);
            if (!studentIdResult.isValid) {
                document.getElementById('result').innerHTML = '<div class="alert alert-danger">' + studentIdResult.message + '</div>';
                return;
            }
            
            const emailResult = validateEmail(email);
            if (!emailResult.isValid) {
                document.getElementById('result').innerHTML = '<div class="alert alert-danger">' + emailResult.message + '</div>';
                return;
            }
            
            const passwordResult = validatePassword(password);
            if (!passwordResult.isValid) {
                document.getElementById('result').innerHTML = '<div class="alert alert-danger">' + passwordResult.message + '</div>';
                return;
            }
            
            document.getElementById('result').innerHTML = '<div class="alert alert-info">Registering...</div>';
            
            try {
                const response = await fetch('https://aamusted-predictor-backend2.onrender.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        full_name: name,
                        email: email,
                        student_id: studentId,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = '<div class="alert alert-success">✅ Registration successful! Redirecting to login...</div>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    document.getElementById('result').innerHTML = '<div class="alert alert-danger">Error: ' + (data.detail || 'Registration failed') + '</div>';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = '<div class="alert alert-danger">Network error: ' + error.message + '</div>';
            }
        });
    </script>
</body>
</html>
