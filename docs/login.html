<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AAMUSTED Performance Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        .message {
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .test-accounts {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .test-accounts h4 {
            margin-bottom: 0.5rem;
            color: #666;
        }
        .test-accounts p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.3rem;
        }
        .test-accounts button {
            width: auto;
            padding: 0.3rem 0.8rem;
            margin: 0.2rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🎓 AAMUSTED Predictor</h2>
        <h3 style="text-align:center; margin-bottom:1rem;">Student Login</h3>
        
        <div id="messageBox" class="message"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit">🔐 Login</button>
        </form>
        
        <div class="test-accounts">
            <h4>📝 Test Accounts:</h4>
            <p><strong>Student:</strong> username: amoateng | password: student123</p>
            <button onclick="fillStudent()">Fill Student</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://student-performance-predictor7.onrender.com';
        
        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `message ${type}`;
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 3000);
        }
        
        function fillStudent() {
            document.getElementById('username').value = 'amoateng';
            document.getElementById('password').value = 'student123';
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('Please enter username and password', 'error');
                return;
            }
            
            // Show loading state
            const loginBtn = document.querySelector('button[type="submit"]');
            const originalText = loginBtn.textContent;
            loginBtn.textContent = '⏳ Logging in...';
            loginBtn.disabled = true;
            
            try {
                console.log('Attempting login...');
                
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Response status:', response.status);
                
                const result = await response.json();
                console.log('Login response:', result);
                
                if (result.success) {
                    // CRITICAL: Save both token AND user data
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    
                    console.log('Saved to localStorage:', {
                        token: result.token,
                        user: result.user
                    });
                    
                    // Verify it was saved
                    const savedUser = localStorage.getItem('currentUser');
                    console.log('Verified saved user:', savedUser);
                    
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        if (result.user.role === 'lecturer') {
                            window.location.href = 'lecturer_dashboard.html';
                        } else {
                            window.location.href = 'student_dashboard.html';
                        }
                    }, 1000);
                } else {
                    showMessage('❌ Login failed: ' + (result.message || 'Invalid credentials'), 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('❌ Network error. Please check your connection.', 'error');
            } finally {
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
