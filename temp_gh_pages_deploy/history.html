<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED | Prediction History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="bg-primary text-white py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-0">USTED</h1>
                    <p class="mb-0 small">Student Self-Assessment Predictor</p>
                </div>
                <nav>
                    <a href="student_dashboard.html" class="text-white me-3">Dashboard</a>
                    <a href="predictor.html" class="text-white me-3">Predict</a>
                    <a href="history.html" class="text-white me-3">History</a>
                    <a href="profile.html" class="text-white me-3">Profile</a>
                    <a href="#" id="logoutBtn" class="text-white">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Prediction History</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Course Code</th>
                                <th>Predicted Grade</th>
                                <th>Confidence</th>
                                <th>Actual Grade</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <tr>
                                <td colspan="5" class="text-center">Loading predictions...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-3 mt-4">
        <div class="container">
            <p class="mb-0">&copy; 2025 USTED. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Load all predictions for history
        async function loadHistory() {
            const token = localStorage.getItem('token');
            const tbody = document.getElementById('historyTable');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/predictions/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const predictions = await response.json();
                
                if (predictions && predictions.length > 0) {
                    tbody.innerHTML = predictions.map(p => `
                        <tr>
                            <td>${p.course_code}</td>
                            <td><span class="badge bg-primary">${p.predicted_grade}</span></td>
                            <td>${p.confidence}%</td>
                            <td>${p.actual_grade || 'Pending'}</td>
                            <td>${new Date(p.created_at).toLocaleDateString()}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">No predictions yet</td></tr>';
                }
            } catch (error) {
                console.error('Error loading history:', error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Error loading history</td></tr>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
