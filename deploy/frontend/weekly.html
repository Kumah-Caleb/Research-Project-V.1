<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Tracking - AAMUSTED Performance Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fb; }
        
        .navbar {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #ffd700; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); }
        .logout-btn {
            background: rgba(255,80,60,0.3);
            border: 1px solid rgba(255,80,60,0.5);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        
        .week-selector {
            background: white;
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .week-btn {
            padding: 0.5rem 1rem;
            background: #e9ecef;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .week-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; }
        input, select { width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 8px; }
        
        .student-info {
            background: #e3f2fd;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .predict-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            display: none;
        }
        .result-card.show { display: block; }
        
        .grade { font-size: 2rem; font-weight: bold; margin: 1rem 0; }
        .score { font-size: 1.2rem; margin: 1rem 0; }
        .recommendations { text-align: left; margin-top: 1rem; padding: 1rem; background: #f8f9fa; border-radius: 10px; }
        
        .excellent { color: #28a745; }
        .good { color: #17a2b8; }
        .average { color: #ffc107; }
        .poor { color: #dc3545; }
        
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #667eea;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .nav-links { justify-content: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">?? AAMUSTED <span>Predictor</span></div>
        <div class="nav-links">
            <a href="student_dashboard.html">Dashboard</a>
            <a href="predictor.html">Predictor</a>
            <a href="courses.html">My Courses</a>
            <a href="history.html">History</a>
            <a href="profile.html">Profile</a>
            <button class="logout-btn" onclick="logout()">?? Logout</button>
        </div>
    </nav>

    <div class="container">
        <a href="predictor.html" class="back-link">? Back to Predictor Options</a>
        
        <div class="student-info" id="studentInfo">
            <strong>????? Predicting for:</strong> <span id="studentName"></span>
        </div>
        
        <div class="form-card">
            <h2 style="margin-bottom: 1.5rem;">?? Weekly Performance Tracking</h2>
            
            <div class="form-group">
                <label>?? Select Course</label>
                <select id="courseSelect">
                    <option value="">Loading courses...</option>
                </select>
            </div>
            
            <div class="week-selector" id="weekSelector"></div>
            
            <div class="form-group">
                <label>Weeks Completed</label>
                <input type="number" id="weeksCompleted" value="1" min="1" max="15">
            </div>
            
            <div class="form-group">
                <label>?? Weekly Attendance (%)</label>
                <input type="number" id="weeklyAttendance" placeholder="Attendance % this week" step="1">
            </div>
            
            <div class="form-group">
                <label>?? Weekly Assignment Score (%)</label>
                <input type="number" id="weeklyAssignments" placeholder="Assignment score this week" step="1">
            </div>
            
            <div class="form-group">
                <label>?? Weekly Engagement (%)</label>
                <input type="number" id="weeklyEngagement" placeholder="Engagement rate this week" step="1">
            </div>
            
            <div class="form-group">
                <label>? Weekly Study Hours</label>
                <input type="number" id="weeklyStudyHours" placeholder="Hours studied this week" step="1">
            </div>
            
            <div class="form-group">
                <label>?? Midterm Grade (%)</label>
                <input type="number" id="midtermGrade" placeholder="Your midterm exam score" step="1">
            </div>
            
            <button class="predict-btn" onclick="predictWeekly()">?? Track This Week</button>
        </div>
        
        <div id="resultCard" class="result-card">
            <h2>?? Weekly Performance Report</h2>
            <div id="predictionGrade" class="grade"></div>
            <div id="predictionScore" class="score"></div>
            <div id="recommendations" class="recommendations"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        let currentUser = null;
        let selectedStudentId = null;
        let courses = [];
        
        function generateWeekButtons() {
            const container = document.getElementById('weekSelector');
            container.innerHTML = '';
            for (let i = 1; i <= 15; i++) {
                const btn = document.createElement('button');
                btn.className = 'week-btn';
                btn.textContent = `Week ${i}`;
                btn.onclick = () => selectWeek(i);
                container.appendChild(btn);
            }
        }
        
        function selectWeek(week) {
            document.querySelectorAll('.week-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('weeksCompleted').value = week;
        }
        
        function loadUser() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                window.location.href = 'login.html';
                return null;
            }
            currentUser = JSON.parse(userStr);
            
            selectedStudentId = localStorage.getItem('selectedStudent');
            if (selectedStudentId && currentUser.role === 'lecturer') {
                document.getElementById('studentInfo').style.display = 'block';
                document.getElementById('studentName').textContent = 'Student';
                loadStudentCourses(selectedStudentId);
            } else {
                loadMyCourses();
            }
            return currentUser;
        }
        
        async function loadStudentCourses(studentId) {
            try {
                const coursesRes = await fetch(`${API_URL}/api/courses?user_id=${studentId}`);
                courses = await coursesRes.json();
                
                const courseSelect = document.getElementById('courseSelect');
                if (courses.length === 0) {
                    courseSelect.innerHTML = '<option value="">No courses enrolled</option>';
                } else {
                    courseSelect.innerHTML = '<option value="">Select a course</option>' + 
                        courses.map(c => `<option value="${c.id}">${c.code} - ${c.name}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }
        
        async function loadMyCourses() {
            try {
                const response = await fetch(`${API_URL}/api/courses?user_id=${currentUser.id}`);
                courses = await response.json();
                
                const courseSelect = document.getElementById('courseSelect');
                if (courses.length === 0) {
                    courseSelect.innerHTML = '<option value="">No courses enrolled</option>';
                } else {
                    courseSelect.innerHTML = '<option value="">Select a course</option>' + 
                        courses.map(c => `<option value="${c.id}">${c.code} - ${c.name}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }
        
        async function predictWeekly() {
            const courseId = document.getElementById('courseSelect').value;
            if (!courseId) {
                alert('Please select a course');
                return;
            }
            
            const week = parseInt(document.querySelector('.week-btn.active')?.textContent?.split(' ')[1] || 1);
            const weeksCompleted = parseFloat(document.getElementById('weeksCompleted').value) || 1;
            
            const data = {
                user_id: selectedStudentId || currentUser.id,
                course_id: courseId,
                week_number: week,
                weeks_completed: weeksCompleted,
                weekly_attendance: parseFloat(document.getElementById('weeklyAttendance').value) || 0,
                weekly_assignments: parseFloat(document.getElementById('weeklyAssignments').value) || 0,
                weekly_engagement: parseFloat(document.getElementById('weeklyEngagement').value) || 0,
                weekly_study_hours: parseFloat(document.getElementById('weeklyStudyHours').value) || 0,
                midterm_grade: parseFloat(document.getElementById('midtermGrade').value) || 0
            };
            
            const response = await fetch(`${API_URL}/api/predict/weekly`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                const gradeClass = result.grade?.includes('Excellent') ? 'excellent' : 
                                  result.grade?.includes('Good') ? 'good' : 
                                  result.grade?.includes('Average') ? 'average' : 'poor';
                
                document.getElementById('predictionGrade').innerHTML = result.grade;
                document.getElementById('predictionGrade').className = `grade ${gradeClass}`;
                document.getElementById('predictionScore').innerHTML = `Projected Score: ${result.score?.toFixed(1)}%`;
                
                if (result.recommendations && result.recommendations.length > 0) {
                    document.getElementById('recommendations').innerHTML = `
                        <strong>?? Recommendations:</strong>
                        <ul>
                            ${result.recommendations.map(r => `<li>${r}</li>`).join('')}
                        </ul>
                    `;
                }
                
                document.getElementById('resultCard').classList.add('show');
            }
        }
        
                        // SIMPLE WORKING LOGOUT
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }/api/logout`, { method: 'POST' });
            } catch(e) {}
            localStorage.clear();
            window.location.href = 'login.html';
        }
        
        loadUser();
        generateWeekButtons();
        selectWeek(1);
    </script>
</body>
</html>
